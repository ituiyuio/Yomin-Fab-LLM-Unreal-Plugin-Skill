# =============================================================================
# YominUnreal Plugins — Jekyll Configuration
# =============================================================================
# Theme: just-the-docs (使用 remote_theme 通过 jekyll-remote-theme 插件加载)
# 架构：Monorepo 支持，未来新增插件只需在 collections 下加声明、在 _plugins/ 下加子目录即可。
# =============================================================================

title: "YominUnreal Plugins"
description: "AI-powered Unreal Engine development tools — UI, Material, VFX, AI"
url: "https://ituiyuio.github.io"
baseurl: "/Yomin-Fab-LLM-Unreal-Pluagin-Skill"
repository: ituiyuio/Yomin-Fab-LLM-Unreal-Pluagin-Skill

# Jekyll 集合目录（Monorepo: 所有插件文档集中在 docs/_plugins/ 下）
collections_dir: _plugins

# just-the-docs 主题（使用 remote_theme 以兼容 GitHub Pages）
remote_theme: just-the-docs/just-the-docs@v0.12.0

# just-the-docs 主题配置
just_the_docs:
  search_enabled: true
  search_heading_level: 2
  aux_links:
    "YominUnreal on GitHub":
      - "https://github.com/yomin-unreal"
  collections:
    llm_dynamic_ui:
      nav_exclude: false
    llm_material:
      nav_exclude: false
    llm_statetree:
      nav_exclude: false
    llm_metasound:
      nav_exclude: false

# ---------------------------------------------------------------------------
# Jekyll Collections — 插件文档
# ---------------------------------------------------------------------------
# 当前只有 LLMDynamicUI。未来新增插件：
#   1. 在 _plugins/<plugin-name>/ 下新建目录，放入 .md 文件
#   2. 在 collections 下加一行：  <plugin_name>:
#   3. 每个 .md 文件顶部 front matter 写 title/description
#   4. 在 just_the_docs.collections 下加条目
# ---------------------------------------------------------------------------
collections:
  llm_dynamic_ui:
    output: true
    permalink: /plugins/llm-dynamic-ui/:path/
  llm_material:
    output: true
    permalink: /plugins/llm-material/:path/
  llm_statetree:
    output: true
    permalink: /plugins/llm-statetree/:path/
  llm_metasound:
    output: true
    permalink: /plugins/llm-metasound/:path/

# ---------------------------------------------------------------------------
# 默认 front matter
# ---------------------------------------------------------------------------
defaults:
  - scope:
      path: "_plugins/llm-dynamic-ui"
      type: llm_dynamic_ui
    values:
      layout: page
      has_children: true
      parent: "LLM Dynamic UI"
      nav_order: 1
  - scope:
      path: "_plugins/llm-material"
      type: llm_material
    values:
      layout: page
      has_children: true
      parent: "LLM Material"
      nav_order: 2
  - scope:
      path: "_plugins/llm-statetree"
      type: llm_statetree
    values:
      layout: page
      has_children: true
      parent: "LLM StateTree"
      nav_order: 3
  - scope:
      path: "_plugins/llm-metasound"
      type: llm_metasound
    values:
      layout: page
      has_children: true
      parent: "LLM MetaSound"
      nav_order: 4

# ---------------------------------------------------------------------------
# Jekyll 插件
# ---------------------------------------------------------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-readme-index
